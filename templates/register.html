<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rejestracja - BookFlow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #f8f9fa; 
            font-family: 'Poppins', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .register-card {
            max-width: 450px;
            width: 100%;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }
        .btn-primary { border-radius: 25px; padding: 12px; font-weight: 600; }
        .form-control { border-radius: 10px; padding: 12px; }
    </style>
</head>
<body>

    <div class="register-card">
        <h2 class="text-center fw-bold text-primary mb-4">Stwórz konto</h2>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} small">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="mb-3">
                <label class="form-label small fw-bold">Nazwa użytkownika</label>
                <input type="text" name="username" class="form-control" placeholder="np. jakub123" required>
            </div>
            <div class="mb-3">
                <label class="form-label small fw-bold">Adres E-mail</label>
                <input type="email" name="email" class="form-control" placeholder="twoj@email.com" required>
            </div>
            <div class="mb-3">
                <label class="form-label small fw-bold">Hasło</label>
                <input type="password" name="password" class="form-control" placeholder="Minimum 8 znaków" required>
            </div>
            <div class="mb-4">
                <label class="form-label small fw-bold">Powtórz hasło</label>
                <input type="password" name="confirm_password" class="form-control" placeholder="Wpisz hasło ponownie" required>
            </div>
            
            <button type="submit" class="btn btn-primary w-100 shadow-sm">Zarejestruj się</button>
        </form>

        <div class="text-center mt-4">
            <p class="small text-muted">Masz już konto? <a href="{{ url_for('login') }}" class="text-primary fw-bold text-decoration-none">Zaloguj się</a></p>
            <a href="/" class="small text-secondary text-decoration-none">← Wróć do biblioteki</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

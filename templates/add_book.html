<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dodaj książkę - Panel Admina</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; font-family: 'Poppins', sans-serif; padding-top: 50px; }
        .admin-card { max-width: 600px; margin: auto; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .btn-add { border-radius: 25px; padding: 12px; font-weight: 600; background: #0d6efd; border: none; }
        .form-label { font-weight: 600; font-size: 0.9rem; color: #444; }
    </style>
</head>
<body>

    <div class="container">
        <div class="admin-card">
            <h2 class="mb-4 fw-bold text-center">Dodaj nową książkę</h2>
            <p class="text-muted text-center mb-4">Wypełnij poniższe pola, aby wprowadzić nową pozycję do katalogu.</p>

            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Tytuł książki</label>
                    <input type="text" name="title" class="form-control" placeholder="np. Harry Potter i Kamień Filozoficzny" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Autor</label>
                    <input type="text" name="author" class="form-control" placeholder="np. J.K. Rowling" required>
                </div>

                <div class="mb-4">
                    <label class="form-label">Link do okładki (URL)</label>
                    <input type="url" name="image_url" class="form-control" placeholder="https://link-do-zdjecia.jpg" required>
                    <div class="form-text"></div>
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary btn-add shadow-sm">Dodaj do biblioteki</button>
                    <a href="/" class="btn btn-link text-decoration-none text-muted">Anuluj i wróć</a>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
